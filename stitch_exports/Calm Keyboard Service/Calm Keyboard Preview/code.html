<style>
        body {

            color: #ffffff;

            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }
        
        .key-active {
            background-color: #1a1a1a !important;
            transition: background-color 0s;

            transition: background-color 0.15s ease-out;

</div>
</div>
<button aria-label="Enter" class="flex-[2] h-tap-target-min flex items-center justify-center font-label-sm text-label-sm text-primary bg-transparent key-transition outline-none focus:outline-none rounded-none border-b border-transparent active:border-primary">ENTER</button>
</div>
</footer>
<script>
        // Simple script to handle binary inversion tap state as per style guide
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                btn.classList.add('key-active');
            }, {passive: true});
            
            btn.addEventListener('touchend', (e) => {
                setTimeout(() => {
                    btn.classList.remove('key-active');
                }, 50); // slight delay for visibility
            }, {passive: true});
            
            btn.addEventListener('touchcancel', (e) => {
                btn.classList.remove('key-active');
            }, {passive: true});

            // Mouse fallback for desktop testing
            btn.addEventListener('mousedown', (e) => {
                btn.classList.add('key-active');
            });
            btn.addEventListener('mouseup', (e) => {
                btn.classList.remove('key-active');
            });
            btn.addEventListener('mouseleave', (e) => {
                btn.classList.remove('key-active');
            });
        });
    </script>
